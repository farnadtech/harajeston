<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تست جستجوی زنده</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <style>
        body { font-family: 'Vazirmatn', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-2xl font-bold mb-6">تست جستجوی زنده</h1>
        
        <div class="bg-white rounded-lg shadow p-6">
            <div class="relative">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="جستجو کنید..."
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    autocomplete="off"
                >
                
                <div id="results" class="mt-4 space-y-2"></div>
            </div>
        </div>
        
        <div class="mt-4 bg-white rounded-lg shadow p-4">
            <h3 class="font-bold mb-2">لاگ:</h3>
            <div id="log" class="text-sm text-gray-600 space-y-1"></div>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const resultsDiv = document.getElementById('results');
        const logDiv = document.getElementById('log');
        
        let searchTimeout;
        
        function addLog(message) {
            const time = new Date().toLocaleTimeString('fa-IR');
            logDiv.innerHTML = `<div>[${time}] ${message}</div>` + logDiv.innerHTML;
        }
        
        searchInput.addEventListener('input', function() {
            clearTimeout(searchTimeout);
            
            const query = this.value.trim();
            
            if (query.length === 0) {
                resultsDiv.innerHTML = '';
                return;
            }
            
            if (query.length < 2) {
                resultsDiv.innerHTML = '<p class="text-gray-500">حداقل 2 کاراکتر وارد کنید</p>';
                return;
            }
            
            resultsDiv.innerHTML = '<p class="text-gray-500">در حال جستجو...</p>';
            addLog(`جستجو برای: "${query}"`);
            
            searchTimeout = setTimeout(() => {
                performSearch(query);
            }, 300);
        });
        
        function performSearch(query) {
            const url = `/api/listings/search?q=${encodeURIComponent(query)}`;
            addLog(`درخواست به: ${url}`);
            
            fetch(url, {
                headers: {
                    'Accept': 'application/json',
                    'X-Requested-With': 'XMLHttpRequest'
                }
            })
            .then(response => {
                addLog(`وضعیت پاسخ: ${response.status}`);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                addLog(`تعداد نتایج: ${data.length}`);
                displayResults(data);
            })
            .catch(error => {
                addLog(`خطا: ${error.message}`);
                resultsDiv.innerHTML = `<p class="text-red-500">خطا: ${error.message}</p>`;
            });
        }
        
        function displayResults(results) {
            if (results.length === 0) {
                resultsDiv.innerHTML = '<p class="text-gray-500">نتیجه‌ای یافت نشد</p>';
                return;
            }
            
            resultsDiv.innerHTML = results.map(result => `
                <div class="border border-gray-200 rounded-lg p-3 hover:bg-gray-50">
                    <div class="flex items-center gap-3">
                        ${result.image_url ? 
                            `<img src="${result.image_url}" alt="${result.title}" class="w-12 h-12 rounded object-cover">` :
                            `<div class="w-12 h-12 rounded bg-gray-200 flex items-center justify-center">
                                <span class="material-symbols-outlined text-gray-400">image</span>
                            </div>`
                        }
                        <div class="flex-1">
                            <p class="font-bold">${result.title}</p>
                            <p class="text-sm text-blue-600">${result.price ? new Intl.NumberFormat('fa-IR').format(result.price) + ' تومان' : 'قیمت تماس'}</p>
                        </div>
                    </div>
                    <a href="${result.url}" class="text-xs text-gray-500 mt-2 block">لینک: ${result.url}</a>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
