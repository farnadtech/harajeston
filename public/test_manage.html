<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test Manage Functions</title>
</head>
<body>
    <h1>Test Manage Page Functions</h1>
    
    <button onclick="testSaveSettings()">Test Save Settings</button>
    <button onclick="testActivate()">Test Activate</button>
    <button onclick="testSuspend()">Test Suspend</button>
    
    <div id="result"></div>
    
    <script>
    function testSaveSettings() {
        console.log('Testing save settings...');
        
        const formData = new FormData();
        formData.append('starting_price', '55000000');
        formData.append('_token', '{{ csrf_token() }}');
        
        fetch('/haraj/public/admin/listings/24/settings', {
            method: 'PUT',
            body: formData,
            headers: {
                'Accept': 'application/json'
            }
        })
        .then(response => {
            console.log('Response status:', response.status);
            return response.json();
        })
        .then(data => {
            console.log('Response data:', data);
            document.getElementById('result').innerHTML = JSON.stringify(data);
        })
        .catch(error => {
            console.error('Error:', error);
            document.getElementById('result').innerHTML = 'Error: ' + error;
        });
    }
    
    function testActivate() {
        fetch('/haraj/public/admin/listings/24/activate', {
            method: 'POST',
            headers: {
                'X-CSRF-TOKEN': 'test',
                'Accept': 'application/json'
            }
        })
        .then(response => response.json())
        .then(data => {
            console.log(data);
            document.getElementById('result').innerHTML = JSON.stringify(data);
        });
    }
    
    function testSuspend() {
        fetch('/haraj/public/admin/listings/24/suspend', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRF-TOKEN': 'test',
                'Accept': 'application/json'
            },
            body: JSON.stringify({ reason: 'test' })
        })
        .then(response => response.json())
        .then(data => {
            console.log(data);
            document.getElementById('result').innerHTML = JSON.stringify(data);
        });
    }
    </script>
</body>
</html>
