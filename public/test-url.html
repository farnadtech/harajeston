<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8">
    <title>تست URL</title>
</head>
<body>
    <h1>تست URL</h1>
    <button onclick="testUrl()">تست</button>
    <div id="result"></div>
    
    <script>
        // این URL باید کار کنه
        const BASE_URL = 'http://localhost/haraj/public';
        
        function testUrl() {
            const listingId = 17;
            const url = `${BASE_URL}/admin/listings/${listingId}/activate`;
            
            document.getElementById('result').innerHTML = `
                <p>URL ساخته شده: <strong>${url}</strong></p>
                <p>در حال ارسال درخواست...</p>
            `;
            
            fetch(url, {
                method: 'POST',
                headers: {
                    'X-CSRF-TOKEN': 'test',
                    'Accept': 'application/json',
                    'Content-Type': 'application/json'
                }
            })
            .then(response => {
                document.getElementById('result').innerHTML += `
                    <p>Status: ${response.status}</p>
                    <p>OK: ${response.ok}</p>
                `;
                return response.text();
            })
            .then(text => {
                document.getElementById('result').innerHTML += `
                    <p>Response: ${text.substring(0, 200)}</p>
                `;
            })
            .catch(error => {
                document.getElementById('result').innerHTML += `
                    <p style="color: red;">Error: ${error}</p>
                `;
            });
        }
    </script>
</body>
</html>
