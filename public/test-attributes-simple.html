<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="utf-8"/>
    <title>تست ساده ویژگی‌ها</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&display=swap" rel="stylesheet"/>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body { font-family: 'Vazirmatn', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 p-8">
    <div class="max-w-2xl mx-auto space-y-6">
        <div class="bg-white rounded-lg shadow p-6">
            <h1 class="text-2xl font-bold mb-6">تست لود ویژگی‌ها</h1>
            
            <!-- دکمه‌های تست -->
            <div class="space-y-3 mb-6">
                <button onclick="testCategory(58)" class="w-full px-4 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                    تست دسته 58
                </button>
                <button onclick="testCategory(59)" class="w-full px-4 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700">
                    تست دسته 59
                </button>
                <button onclick="testCategory(60)" class="w-full px-4 py-3 bg-purple-600 text-white rounded-lg hover:bg-purple-700">
                    تست دسته 60
                </button>
                <button onclick="testCategory(null)" class="w-full px-4 py-3 bg-red-600 text-white rounded-lg hover:bg-red-700">
                    پاک کردن
                </button>
            </div>
            
            <!-- بخش ویژگی‌ها -->
            <div id="attributesSection" x-data="{ hasCategory: false, loading: false, attributes: [] }">
                <!-- پیام راهنما -->
                <div x-show="!hasCategory" class="bg-blue-50 border border-blue-200 rounded-lg p-4 text-center">
                    <span class="material-symbols-outlined text-blue-600 text-3xl">info</span>
                    <p class="text-sm text-blue-700 mt-2">روی یکی از دکمه‌ها کلیک کنید</p>
                </div>
                
                <!-- بارگذاری -->
                <div x-show="loading" class="text-center py-6">
                    <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-600 border-t-transparent"></div>
                    <p class="text-sm text-gray-600 mt-2">در حال بارگذاری...</p>
                </div>
                
                <!-- ویژگی‌ها -->
                <div x-show="hasCategory && !loading && attributes.length > 0" class="space-y-3">
                    <div class="p-3 bg-green-50 border border-green-200 rounded-lg">
                        <p class="text-sm text-green-800 font-medium">✓ ویژگی‌ها لود شدند:</p>
                    </div>
                    <template x-for="attr in attributes" :key="attr.id">
                        <div class="p-3 border border-gray-200 rounded-lg">
                            <p class="text-sm font-medium text-gray-700" x-text="attr.name"></p>
                            <p class="text-xs text-gray-500" x-text="'نوع: ' + attr.type"></p>
                        </div>
                    </template>
                </div>
                
                <!-- عدم وجود ویژگی -->
                <div x-show="hasCategory && !loading && attributes.length === 0" class="bg-gray-50 border border-gray-200 rounded-lg p-4 text-center">
                    <span class="material-symbols-outlined text-gray-400 text-3xl">check_circle</span>
                    <p class="text-sm text-gray-600 mt-2">این دسته ویژگی ندارد</p>
                </div>
            </div>
            
            <!-- لاگ -->
            <div class="mt-6 p-4 bg-gray-900 text-green-400 rounded-lg font-mono text-xs" id="log" style="max-height: 300px; overflow-y: auto;">
                <div>→ آماده برای تست...</div>
            </div>
        </div>
    </div>

    <script>
    // تابع لاگ
    function log(message, type = 'info') {
        const logDiv = document.getElementById('log');
        const colors = {
            info: 'text-blue-400',
            success: 'text-green-400',
            error: 'text-red-400',
            warning: 'text-yellow-400'
        };
        const div = document.createElement('div');
        div.className = colors[type];
        div.textContent = `${new Date().toLocaleTimeString('fa-IR')} - ${message}`;
        logDiv.appendChild(div);
        logDiv.scrollTop = logDiv.scrollHeight;
        console.log(message);
    }

    // Alpine.js init
    document.addEventListener('alpine:init', () => {
        log('✓ Alpine.js initialized', 'success');
    });

    // منتظر Alpine.js روی element خاص
    function waitForAlpineOnElement(selector, callback, maxAttempts = 50) {
        let attempts = 0;
        
        function check() {
            attempts++;
            const element = document.querySelector(selector);
            
            if (!element) {
                log(`⏳ Attempt ${attempts}: Element not found`, 'warning');
                if (attempts < maxAttempts) {
                    setTimeout(check, 100);
                } else {
                    log('✗ Element not found after max attempts', 'error');
                }
                return;
            }
            
            if (element.__x && element.__x.$data) {
                log(`✓ Alpine.js ready on element (attempt ${attempts})`, 'success');
                callback(element);
            } else {
                log(`⏳ Attempt ${attempts}: Alpine.js not ready on element`, 'warning');
                if (attempts < maxAttempts) {
                    setTimeout(check, 100);
                } else {
                    log('✗ Alpine.js not initialized after max attempts', 'error');
                }
            }
        }
        
        check();
    }

    // تست دسته
    function testCategory(categoryId) {
        log(`→ Testing category: ${categoryId || 'null'}`, 'info');
        
        waitForAlpineOnElement('#attributesSection', (section) => {
            const alpineData = section.__x.$data;
            
            if (!categoryId) {
                alpineData.hasCategory = false;
                alpineData.attributes = [];
                log('✓ Category cleared', 'success');
                return;
            }
            
            alpineData.hasCategory = true;
            alpineData.loading = true;
            
            log(`→ Fetching /api/categories/${categoryId}/attributes`, 'info');
            
            fetch(`/api/categories/${categoryId}/attributes`)
                .then(response => {
                    log(`✓ Response status: ${response.status}`, response.ok ? 'success' : 'error');
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    log(`✓ Data received: ${JSON.stringify(data)}`, 'success');
                    alpineData.loading = false;
                    if (data.attributes && data.attributes.length > 0) {
                        alpineData.attributes = data.attributes;
                        log(`✓ ${data.attributes.length} attributes loaded`, 'success');
                    } else {
                        alpineData.attributes = [];
                        log('✓ No attributes for this category', 'warning');
                    }
                })
                .catch(error => {
                    log(`✗ Error: ${error.message}`, 'error');
                    alpineData.loading = false;
                    alpineData.attributes = [];
                });
        });
    }

    // تست اتوماتیک بعد از لود
    window.addEventListener('load', () => {
        log('✓ Page loaded', 'success');
        setTimeout(() => {
            log('→ Running auto test in 2 seconds...', 'info');
            testCategory(58);
        }, 2000);
    });
    </script>
</body>
</html>
